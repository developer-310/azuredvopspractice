trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Centralized variables for easy adjustments
  acrLoginServer: 'acrdevopspractice310.azurecr.io'
  imageRepository: 'azuredvopspractice'

stages:

# ========================================================
# STAGE 1: COMPILE AND CODE QUALITY SCAN
# ========================================================
- stage: BuildAndQualityScan
  displayName: '1. Build & SonarQube Scan'
  jobs:
  - job: MavenBuild
    displayName: 'Maven Package & Scan'
    steps:
    # Step 1: Ensure Java 17 is installed on the agent
    - task: JavaToolInstaller@0
      inputs:
        versionSpec: '17'
        jdkArchitectureOption: 'x64'
        jdkSourceOption: 'PreInstalled'

    # Step 2: Prepare SonarQube Cloud Analysis Configuration
    - task: SonarCloudPrepare@4
      displayName: 'Prepare SonarQube Cloud Analysis'
      inputs:
        SonarCloud: 'newserviceconnectionforazuredevops'
        organization: 'developer-310'
        scannerMode: 'Other'
        extraProperties: |
          sonar.projectKey=developer-310_azuredvopspractice
          sonar.projectName=azuredvopspractice

    # Step 3: Compile the Spring Boot application and execute Sonar injection
    - task: Maven@4
      displayName: 'Maven Package Application & Scan'
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean package'
        options: '-DskipTests' 
        publishJUnitResults: false
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.17'
        mavenVersionOption: 'Default'
        sonarQubeRunAnalysis: true 

    # Step 4: Publish Quality Gate Results back to Azure DevOps UI
    - task: SonarCloudPublish@4
      displayName: 'Publish Quality Gate Result'
      inputs:
        pollingTimeoutSec: '300'

    # Step 5: Save target directory contents so Stage 2 can access them
    - task: PublishPipelineArtifact@1
      displayName: 'Archive Compiled Target Artifacts'
      inputs:
        targetPath: 'target'
        artifact: 'drop-target-folder'
        publishLocation: 'pipeline'

# ========================================================
# STAGE 2: CONTAINERIZATION AND TRIVY SCAN
# ========================================================
- stage: ContainerSecurity
  displayName: '2. Docker Build & Trivy Scan'
  dependsOn: BuildAndQualityScan
  condition: succeeded()
  jobs:
  - job: DockerAndTrivy
    displayName: 'Dockerize & Run Security Scan'
    steps:
    # Step 1: Fetch the compiled jar directory archived in Stage 1
    - task: DownloadPipelineArtifact@2
      displayName: 'Download Target Artifacts'
      inputs:
        buildType: 'current'
        artifactName: 'drop-target-folder'
        targetPath: '$(System.DefaultWorkingDirectory)/target'

    # Step 2: Remove extra structural files to prevent Docker configuration issues
    - script: |
        rm -f target/*.original
      displayName: 'Clean Target Artifacts'

    # Step 3: Install Trivy Security Scanner on the hosted agent
    - script: |
        sudo apt-get install wget apt-transport-https gnupg lsb-release -y
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy -y
      displayName: 'Install Trivy Scanner'

    # Step 4: Build the Docker Image locally using the full ACR server path prefix
    - script: |
        docker build -t $(acrLoginServer)/$(imageRepository):$(Build.BuildId) .
      displayName: 'Docker Build Image'

    # Step 5: Scan the newly built local Docker image using Trivy
    - script: |
        trivy image --severity HIGH,CRITICAL --exit-code 0 $(acrLoginServer)/$(imageRepository):$(Build.BuildId)
      displayName: 'Scan Docker Image with Trivy'

# ========================================================
# STAGE 3: PUSH SECURE IMAGE TO REGISTRY
# ========================================================
- stage: PushToACR
  displayName: '3. Push Image to Azure Registry'
  dependsOn: ContainerSecurity
  condition: succeeded()
  jobs:
  - job: PushImage
    displayName: 'Push Image to ACR'
    steps:
    # Authenticate and securely push the scanned image up using your manual service connection
    - task: Docker@2
      displayName: 'Push Image to Azure Container Registry'
      inputs:
        containerRegistry: 'acrServiceConnection'
        repository: '$(imageRepository)'
        command: 'push'
        tags: '$(Build.BuildId)'